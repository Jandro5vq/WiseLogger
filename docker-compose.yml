services:
  wiselogger:
    build:
      context: .
      args:
        # Displayed app version = git tag on main. Pass it at build time, e.g.:
        #   APP_VERSION=$(git describe --tags) docker compose build
        APP_VERSION: ${APP_VERSION:-}
    image: wiselogger:latest
    container_name: wiselogger
    ports:
      - "3000:3000"
    volumes:
      - wiselogger_data:/data
    environment:
      - SECRET_KEY=${SECRET_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - BASE_URL=${BASE_URL:-http://localhost:3000}
      - DB_PATH=/data/wiselogger.db
      - PORT=3000
      - INVITATION_EXPIRY_HOURS=${INVITATION_EXPIRY_HOURS:-72}
      - BACKUP_CRON=${BACKUP_CRON:-0 2 * * *}
      - BACKUP_PATH=/data/backups
      - AUTO_CLOSE_CRON=${AUTO_CLOSE_CRON:-55 23 * * *}
    restart: unless-stopped
    deploy:
      resources:
        limits:
          memory: 512M
          cpus: '1.0'

volumes:
  wiselogger_data:
